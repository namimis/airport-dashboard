name: Update IIAC weekly schedule

on:
  schedule:
    # 매주 월요일 오전 6시 KST 실행
    # GitHub Actions schedule은 UTC 기준입니다.
    # 월요일 06:00 KST = 일요일 21:00 UTC
    - cron: "0 21 * * 0"

  workflow_dispatch:
    inputs:
      snapshot_date:
        description: "스냅샷 날짜. YYYY-MM-DD 형식. 비워두면 한국 시간 기준 오늘 날짜를 사용합니다."
        required: false
        default: ""

jobs:
  update-iiac-weekly-schedule:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      PUBLIC_DATA_KEY: ${{ secrets.PUBLIC_DATA_KEY }}
      SNAPSHOT_DATE: ${{ github.event.inputs.snapshot_date || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests supabase numpy

      - name: Run IIAC weekly schedule update
        run: |
          python scripts/update_iiac_weekly_schedule.py --snapshot-date "$SNAPSHOT_DATE"
